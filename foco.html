<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>foco. — pomodoro & tarefas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F1EA;
    --ink:#201F1C;
    --ink-soft:#7A7870;
    --line:#DBD6C9;
    --focus:#2F4538;
    --focus-soft:#E3E9DF;
    --break:#9C7A2E;
    --break-soft:#F1E8D2;
    --long:#6E4B6E;
    --long-soft:#EAE0EA;
    --danger:#9B4A3F;
    --white:#FFFFFF;
    --radius:2px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }

  .app{
    width:100%;
    max-width:560px;
    padding:32px 24px 60px;
  }

  /* ---------- Topbar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:40px;
  }

  .brand{
    font-weight:700;
    font-size:15px;
    letter-spacing:0.06em;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brand .mark{
    width:10px;height:10px;
    background:var(--accent, var(--focus));
    display:inline-block;
    transition:background .3s ease;
  }

  .tabs{
    display:flex;
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .tab{
    font-family:'Space Grotesk', sans-serif;
    font-size:13px;
    font-weight:500;
    letter-spacing:0.02em;
    background:transparent;
    border:none;
    padding:9px 16px;
    cursor:pointer;
    color:var(--ink-soft);
    transition:all .2s ease;
  }
  .tab + .tab{ border-left:1px solid var(--line); }
  .tab.active{ background:var(--ink); color:var(--bg); }
  .tab:focus-visible{ outline:2px solid var(--accent, var(--focus)); outline-offset:-2px; }

  .view{ display:none; }
  .view.active{ display:block; animation:fadein .25s ease; }
  @keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- Mode pills ---------- */
  .mode-row{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:24px;
  }
  .mode-pill{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:7px 16px;
    border:1px solid var(--line);
    background:var(--white);
    color:var(--ink-soft);
    border-radius:20px;
    cursor:pointer;
    transition:all .2s ease;
    white-space:nowrap;
  }
  .mode-pill.active[data-mode="focus"]{ background:var(--focus); border-color:var(--focus); color:var(--focus-soft); }
  .mode-pill.active[data-mode="break"]{ background:var(--break); border-color:var(--break); color:var(--break-soft); }
  .mode-pill.active[data-mode="longBreak"]{ background:var(--long); border-color:var(--long); color:var(--long-soft); }
  .mode-pill:disabled{ cursor:not-allowed; opacity:.55; }

  /* ---------- Cycle dots ---------- */
  .cycle-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
    margin-bottom:18px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    color:var(--ink-soft);
    letter-spacing:0.06em;
  }
  .cycle-dots{ display:flex; gap:5px; margin-left:2px; }
  .cycle-dot{
    width:7px; height:7px;
    border-radius:50%;
    background:var(--line);
    border:1px solid var(--line);
  }
  .cycle-dot.filled{ background:var(--focus); border-color:var(--focus); }

  /* ---------- Minute ticks ---------- */
  .minute-ticks{
    display:flex;
    gap:3px;
    margin-bottom:22px;
    height:14px;
  }
  .tick{
    flex:1;
    background:var(--white);
    border:1px solid var(--line);
    position:relative;
    overflow:hidden;
    border-radius:1px;
  }
  .tick .fill{
    position:absolute; left:0; top:0; bottom:0;
    width:0%;
    background:var(--accent, var(--focus));
    transition:width 1s linear;
  }
  .tick.filled .fill{ width:100%; transition:none; }

  /* ---------- Timer frame ---------- */
  .timer-frame{
    position:relative;
    width:min(320px, 78vw);
    height:min(320px, 78vw);
    margin:0 auto 28px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .corner{
    position:absolute;
    width:26px; height:26px;
    border:3px solid var(--accent, var(--focus));
    transition:border-color .3s ease;
  }
  .corner.tl{ top:0; left:0; border-right:none; border-bottom:none; }
  .corner.tr{ top:0; right:0; border-left:none; border-bottom:none; }
  .corner.bl{ bottom:0; left:0; border-right:none; border-top:none; }
  .corner.br{ bottom:0; right:0; border-left:none; border-top:none; }

  .time-display{
    font-family:'Major Mono Display', monospace;
    font-size:clamp(44px, 11vw, 64px);
    letter-spacing:0.02em;
    color:var(--ink);
    font-variant-numeric:tabular-nums;
  }

  /* ---------- Duration controls ---------- */
  .duration-controls{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:22px;
    margin-bottom:30px;
  }
  .duration-item{ text-align:center; }
  .duration-item label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .stepper{
    display:flex;
    align-items:center;
    gap:10px;
    border:1px solid var(--line);
    background:var(--white);
    border-radius:var(--radius);
    padding:6px 10px;
  }
  .stepper button{
    width:20px; height:20px;
    border:1px solid var(--line);
    background:var(--bg);
    color:var(--ink);
    font-size:13px;
    line-height:1;
    cursor:pointer;
    border-radius:1px;
    display:flex; align-items:center; justify-content:center;
  }
  .stepper button:hover:not(:disabled){ background:var(--ink); color:var(--bg); }
  .stepper button:disabled{ opacity:.4; cursor:not-allowed; }
  .stepper span{ font-family:'IBM Plex Mono', monospace; font-size:14px; min-width:20px; text-align:center; }
  .stepper .unit{ color:var(--ink-soft); font-size:10px; min-width:auto; }

  /* ---------- Buttons ---------- */
  .controls{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:22px;
  }
  .btn{
    font-family:'Space Grotesk', sans-serif;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.03em;
    padding:12px 28px;
    border-radius:var(--radius);
    cursor:pointer;
    border:1px solid var(--ink);
    transition:all .2s ease;
  }
  .btn.primary{ background:var(--ink); color:var(--bg); min-width:130px; }
  .btn.primary:hover{ background:var(--accent, var(--focus)); border-color:var(--accent, var(--focus)); }
  .btn.ghost{ background:transparent; color:var(--ink); border-color:var(--line); }
  .btn.ghost:hover{ border-color:var(--ink); }
  .btn:focus-visible{ outline:2px solid var(--accent, var(--focus)); outline-offset:2px; }

  .sessions-row{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:0.04em;
    margin-bottom:28px;
  }
  .sessions-row span{ color:var(--ink); font-weight:500; }

  /* ---------- Music panel ---------- */
  .music-section{
    border-top:1px solid var(--line);
    padding-top:20px;
  }
  .music-toggle{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    background:none;
    border:none;
    cursor:pointer;
    padding:4px 0;
    font-family:'Space Grotesk', sans-serif;
    color:var(--ink);
  }
  .music-toggle .label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.02em;
  }
  .music-toggle .label .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent, var(--focus));
  }
  .music-toggle .chev{
    font-family:'IBM Plex Mono', monospace;
    color:var(--ink-soft);
    transition:transform .2s ease;
    font-size:11px;
  }
  .music-toggle.open .chev{ transform:rotate(180deg); }

  .music-panel{
    display:none;
    padding-top:16px;
  }
  .music-panel.open{ display:block; }

  .music-select{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:var(--white);
    font-family:'Space Grotesk', sans-serif;
    font-size:13px;
    color:var(--ink);
    margin-bottom:12px;
  }
  .music-frame-wrap{
    position:relative;
    width:100%;
    padding-top:56.25%;
    background:var(--ink);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .music-frame-wrap iframe{
    position:absolute; top:0; left:0; width:100%; height:100%; border:none;
  }
  .music-hint{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    color:var(--ink-soft);
    margin-top:10px;
    line-height:1.5;
  }

  /* ---------- Checklist ---------- */
  .checklist-header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:20px;
  }
  .checklist-header h2{
    font-size:18px;
    font-weight:600;
    margin:0;
  }
  #progressLabel{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
  }

  .add-row{
    display:flex;
    gap:8px;
    margin-bottom:24px;
  }
  .add-row input{
    flex:1;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:var(--white);
    font-family:'Space Grotesk', sans-serif;
    font-size:14px;
    color:var(--ink);
  }
  .add-row input:focus{ outline:none; border-color:var(--ink); }
  .add-row button{
    padding:12px 18px;
    border:1px solid var(--ink);
    background:var(--ink);
    color:var(--bg);
    font-family:'Space Grotesk', sans-serif;
    font-size:13px;
    font-weight:600;
    border-radius:var(--radius);
    cursor:pointer;
    white-space:nowrap;
  }
  .add-row button:hover{ opacity:.85; }

  #checklist{
    list-style:none;
    margin:0; padding:0;
  }
  .item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:13px 4px;
    border-bottom:1px solid var(--line);
  }
  .item .box{
    width:18px; height:18px;
    min-width:18px;
    border:1.5px solid var(--ink-soft);
    border-radius:2px;
    cursor:pointer;
    position:relative;
    transition:all .15s ease;
  }
  .item.done .box{ background:var(--focus); border-color:var(--focus); }
  .item.done .box::after{
    content:'';
    position:absolute; left:5px; top:1px;
    width:5px; height:9px;
    border:solid var(--white);
    border-width:0 2px 2px 0;
    transform:rotate(45deg);
  }
  .item .text{
    flex:1;
    font-size:14px;
    outline:none;
    word-break:break-word;
  }
  .item.done .text{ color:var(--ink-soft); text-decoration:line-through; }
  .item .del{
    background:none; border:none;
    color:var(--ink-soft);
    font-size:16px;
    cursor:pointer;
    padding:2px 6px;
    line-height:1;
  }
  .item .del:hover{ color:var(--danger); }

  .empty-state{
    text-align:center;
    padding:40px 10px;
    color:var(--ink-soft);
    font-size:13px;
    font-family:'IBM Plex Mono', monospace;
    border:1px dashed var(--line);
    border-radius:var(--radius);
  }

  @media (max-width:420px){
    .duration-controls{ gap:16px; }
    .app{ padding:24px 16px 50px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand"><span class="mark" id="brandMark"></span>foco.</div>
    <nav class="tabs">
      <button class="tab active" data-tab="timer">Timer</button>
      <button class="tab" data-tab="checklist">Checklist</button>
    </nav>
  </div>

  <main>
    <!-- TIMER VIEW -->
    <section id="view-timer" class="view active">
      <div class="mode-row">
        <button class="mode-pill active" data-mode="focus">Foco</button>
        <button class="mode-pill" data-mode="break">Pausa</button>
        <button class="mode-pill" data-mode="longBreak">Pausa longa</button>
      </div>

      <div class="cycle-row">
        ciclo <span id="cycleLabel">1</span> de 4 até a pausa longa
        <span class="cycle-dots" id="cycleDots"></span>
      </div>

      <div class="minute-ticks" id="ticks"></div>

      <div class="timer-frame">
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>
        <div class="time-display" id="timeDisplay">25:00</div>
      </div>

      <div class="duration-controls">
        <div class="duration-item">
          <label>Foco</label>
          <div class="stepper">
            <button data-adjust="focus" data-delta="-1" aria-label="Diminuir foco">–</button>
            <span id="focusVal">25</span><span class="unit">min</span>
            <button data-adjust="focus" data-delta="1" aria-label="Aumentar foco">+</button>
          </div>
        </div>
        <div class="duration-item">
          <label>Pausa</label>
          <div class="stepper">
            <button data-adjust="break" data-delta="-1" aria-label="Diminuir pausa">–</button>
            <span id="breakVal">5</span><span class="unit">min</span>
            <button data-adjust="break" data-delta="1" aria-label="Aumentar pausa">+</button>
          </div>
        </div>
        <div class="duration-item">
          <label>Pausa longa</label>
          <div class="stepper">
            <button data-adjust="longBreak" data-delta="-1" aria-label="Diminuir pausa longa">–</button>
            <span id="longBreakVal">15</span><span class="unit">min</span>
            <button data-adjust="longBreak" data-delta="1" aria-label="Aumentar pausa longa">+</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn" class="btn primary">Iniciar</button>
        <button id="resetBtn" class="btn ghost">Reiniciar</button>
      </div>

      <div class="sessions-row"><span id="sessionCount">0</span> sessões de foco concluídas hoje</div>

      <div class="music-section">
        <button class="music-toggle" id="musicToggle">
          <span class="label"><span class="dot"></span>Música para focar</span>
          <span class="chev">▾</span>
        </button>
        <div class="music-panel" id="musicPanel">
          <select class="music-select" id="musicSelect">
            <option value="X4VbdwhkE10">lofi hip hop radio 📚 — beats to relax/study to</option>
            <option value="b4g8Uz7KP1A">Lo-Fi Girl LIVE 🌙 — cozy beats</option>
          </select>
          <div class="music-frame-wrap">
            <iframe id="musicFrame" src="" title="Rádio lofi" allow="autoplay; encrypted-media" allowfullscreen></iframe>
          </div>
          <p class="music-hint">Transmissão ao vivo via YouTube. Use os controles do player para tocar/pausar e ajustar o volume.</p>
        </div>
      </div>
    </section>

    <!-- CHECKLIST VIEW -->
    <section id="view-checklist" class="view">
      <div class="checklist-header">
        <h2>Lista de tarefas</h2>
        <span id="progressLabel">0 de 0</span>
      </div>
      <form id="addForm" class="add-row">
        <input id="newItemInput" placeholder="Adicionar tarefa..." autocomplete="off" maxlength="200"/>
        <button type="submit">Adicionar</button>
      </form>
      <ul id="checklist"></ul>
      <div id="emptyState" class="empty-state">nenhuma tarefa ainda — adicione a primeira acima</div>
    </section>
  </main>
</div>

<script>
(function(){
  const root = document.documentElement;

  // ---------------- State ----------------
  let state = {
    focusMin: 25,
    breakMin: 5,
    longBreakMin: 15,
    mode: 'focus',        // 'focus' | 'break' | 'longBreak'
    secondsLeft: 25*60,
    running: false,
    sessionsToday: 0,
    cycleCount: 0          // focus sessions completed since last long break (0-3)
  };
  let items = [];
  let intervalId = null;
  let musicLoaded = false;

  const STORAGE_KEY_SETTINGS = 'foco-settings';
  const STORAGE_KEY_ITEMS = 'foco-checklist-items';

  const els = {
    timeDisplay: document.getElementById('timeDisplay'),
    focusVal: document.getElementById('focusVal'),
    breakVal: document.getElementById('breakVal'),
    longBreakVal: document.getElementById('longBreakVal'),
    startBtn: document.getElementById('startBtn'),
    resetBtn: document.getElementById('resetBtn'),
    sessionCount: document.getElementById('sessionCount'),
    cycleLabel: document.getElementById('cycleLabel'),
    cycleDots: document.getElementById('cycleDots'),
    ticks: document.getElementById('ticks'),
    modePills: document.querySelectorAll('.mode-pill'),
    brandMark: document.getElementById('brandMark'),
    tabs: document.querySelectorAll('.tab'),
    views: document.querySelectorAll('.view'),
    checklist: document.getElementById('checklist'),
    addForm: document.getElementById('addForm'),
    newItemInput: document.getElementById('newItemInput'),
    progressLabel: document.getElementById('progressLabel'),
    emptyState: document.getElementById('emptyState'),
    musicToggle: document.getElementById('musicToggle'),
    musicPanel: document.getElementById('musicPanel'),
    musicSelect: document.getElementById('musicSelect'),
    musicFrame: document.getElementById('musicFrame')
  };

  // ---------------- Storage helpers ----------------
  async function loadSettings(){
    try{
      const res = await window.storage.get(STORAGE_KEY_SETTINGS, false);
      if(res && res.value){
        const saved = JSON.parse(res.value);
        state.focusMin = saved.focusMin ?? 25;
        state.breakMin = saved.breakMin ?? 5;
        state.longBreakMin = saved.longBreakMin ?? 15;
        state.sessionsToday = saved.sessionsToday ?? 0;
        state.cycleCount = saved.cycleCount ?? 0;
      }
    }catch(e){ /* no saved settings yet */ }
    state.secondsLeft = durationFor(state.mode) * 60;
  }

  async function saveSettings(){
    try{
      await window.storage.set(STORAGE_KEY_SETTINGS, JSON.stringify({
        focusMin: state.focusMin,
        breakMin: state.breakMin,
        longBreakMin: state.longBreakMin,
        sessionsToday: state.sessionsToday,
        cycleCount: state.cycleCount
      }), false);
    }catch(e){ console.error('Falha ao salvar configurações', e); }
  }

  async function loadItems(){
    try{
      const res = await window.storage.get(STORAGE_KEY_ITEMS, false);
      if(res && res.value){ items = JSON.parse(res.value); }
    }catch(e){ items = []; }
  }

  async function saveItems(){
    try{
      await window.storage.set(STORAGE_KEY_ITEMS, JSON.stringify(items), false);
    }catch(e){ console.error('Falha ao salvar checklist', e); }
  }

  // ---------------- Timer rendering ----------------
  function durationFor(mode){
    if(mode === 'focus') return state.focusMin;
    if(mode === 'break') return state.breakMin;
    return state.longBreakMin;
  }
  function totalSecondsForMode(mode){ return durationFor(mode) * 60; }

  function formatTime(sec){
    const m = Math.floor(sec/60).toString().padStart(2,'0');
    const s = Math.floor(sec%60).toString().padStart(2,'0');
    return m+':'+s;
  }

  function applyAccent(){
    const varName = state.mode === 'focus' ? '--focus' : (state.mode === 'break' ? '--break' : '--long');
    const accent = getComputedStyle(root).getPropertyValue(varName);
    root.style.setProperty('--accent', accent.trim());
  }

  function renderTicks(){
    const totalMinutes = Math.ceil(totalSecondsForMode(state.mode)/60);
    const elapsedSeconds = totalSecondsForMode(state.mode) - state.secondsLeft;
    els.ticks.innerHTML = '';
    for(let i=0; i<totalMinutes; i++){
      const tick = document.createElement('div');
      tick.className = 'tick';
      const fill = document.createElement('div');
      fill.className = 'fill';
      const minuteStartSec = i*60;
      if(elapsedSeconds >= minuteStartSec + 60){
        tick.classList.add('filled');
      } else if(elapsedSeconds > minuteStartSec){
        const pct = ((elapsedSeconds - minuteStartSec)/60)*100;
        fill.style.width = pct+'%';
      }
      tick.appendChild(fill);
      els.ticks.appendChild(tick);
    }
  }

  function renderCycle(){
    const displayCount = state.cycleCount === 0 && state.mode !== 'focus' ? 4 : state.cycleCount + (state.mode==='focus' ? 1 : 0);
    els.cycleLabel.textContent = Math.min(displayCount, 4);
    els.cycleDots.innerHTML = '';
    for(let i=0;i<4;i++){
      const dot = document.createElement('span');
      dot.className = 'cycle-dot' + (i < state.cycleCount ? ' filled' : '');
      els.cycleDots.appendChild(dot);
    }
  }

  function renderTimer(){
    els.timeDisplay.textContent = formatTime(state.secondsLeft);
    els.focusVal.textContent = state.focusMin;
    els.breakVal.textContent = state.breakMin;
    els.longBreakVal.textContent = state.longBreakMin;
    els.sessionCount.textContent = state.sessionsToday;
    els.startBtn.textContent = state.running ? 'Pausar' : (state.secondsLeft === totalSecondsForMode(state.mode) ? 'Iniciar' : 'Continuar');

    els.modePills.forEach(p=>{
      const isActive = p.dataset.mode === state.mode;
      p.classList.toggle('active', isActive);
      p.disabled = state.running;
    });

    document.querySelectorAll('[data-adjust]').forEach(btn=>{
      const key = btn.dataset.adjust;
      btn.disabled = state.running && key === state.mode;
    });

    applyAccent();
    renderTicks();
    renderCycle();
    document.title = (state.running ? formatTime(state.secondsLeft)+' · ' : '') + 'foco.';
  }

  // ---------------- Timer logic ----------------
  function playChime(){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 660;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.9);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime+0.9);
    }catch(e){ /* audio not available */ }
  }

  function tick(){
    state.secondsLeft -= 1;
    if(state.secondsLeft <= 0){
      playChime();
      if(state.mode === 'focus'){
        state.sessionsToday += 1;
        state.cycleCount += 1;
        if(state.cycleCount >= 4){
          state.mode = 'longBreak';
        } else {
          state.mode = 'break';
        }
      } else {
        if(state.mode === 'longBreak'){ state.cycleCount = 0; }
        state.mode = 'focus';
      }
      state.secondsLeft = totalSecondsForMode(state.mode);
      saveSettings();
    }
    renderTimer();
  }

  function startPause(){
    if(state.running){
      state.running = false;
      clearInterval(intervalId);
    } else {
      state.running = true;
      intervalId = setInterval(tick, 1000);
    }
    renderTimer();
  }

  function reset(){
    state.running = false;
    clearInterval(intervalId);
    state.secondsLeft = totalSecondsForMode(state.mode);
    renderTimer();
  }

  function switchMode(mode){
    if(state.running) return;
    state.mode = mode;
    state.secondsLeft = totalSecondsForMode(mode);
    renderTimer();
  }

  function adjustDuration(key, delta){
    if(state.running && key === state.mode) return;
    const field = key === 'focus' ? 'focusMin' : (key === 'break' ? 'breakMin' : 'longBreakMin');
    let val = state[field] + delta;
    val = Math.max(1, Math.min(120, val));
    state[field] = val;
    if(state.mode === key){
      state.secondsLeft = totalSecondsForMode(state.mode);
    }
    saveSettings();
    renderTimer();
  }

  // ---------------- Music ----------------
  function setMusicSrc(videoId){
    els.musicFrame.src = 'https://www.youtube.com/embed/'+videoId+'?autoplay=0&rel=0';
  }

  els.musicToggle.addEventListener('click', ()=>{
    const isOpen = els.musicPanel.classList.toggle('open');
    els.musicToggle.classList.toggle('open', isOpen);
    if(isOpen && !musicLoaded){
      setMusicSrc(els.musicSelect.value);
      musicLoaded = true;
    }
  });

  els.musicSelect.addEventListener('change', ()=>{
    setMusicSrc(els.musicSelect.value);
    musicLoaded = true;
  });

  // ---------------- Checklist logic ----------------
  function uid(){ return 'i'+Date.now()+Math.random().toString(36).slice(2,7); }

  function renderChecklist(){
    els.checklist.innerHTML = '';
    els.emptyState.style.display = items.length ? 'none' : 'block';

    items.forEach(item=>{
      const li = document.createElement('li');
      li.className = 'item' + (item.done ? ' done' : '');
      li.dataset.id = item.id;

      const box = document.createElement('div');
      box.className = 'box';
      box.setAttribute('role','checkbox');
      box.setAttribute('aria-checked', item.done);
      box.tabIndex = 0;
      box.addEventListener('click', ()=> toggleItem(item.id));
      box.addEventListener('keydown', e=>{ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); toggleItem(item.id); }});

      const text = document.createElement('div');
      text.className = 'text';
      text.contentEditable = 'true';
      text.spellcheck = false;
      text.textContent = item.text;
      text.addEventListener('blur', ()=> updateItemText(item.id, text.textContent));
      text.addEventListener('keydown', e=>{
        if(e.key === 'Enter'){ e.preventDefault(); text.blur(); }
      });

      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '×';
      del.setAttribute('aria-label','Remover tarefa');
      del.addEventListener('click', ()=> deleteItem(item.id));

      li.appendChild(box);
      li.appendChild(text);
      li.appendChild(del);
      els.checklist.appendChild(li);
    });

    const doneCount = items.filter(i=>i.done).length;
    els.progressLabel.textContent = doneCount+' de '+items.length;
  }

  function addItem(text){
    const clean = text.trim();
    if(!clean) return;
    items.unshift({ id: uid(), text: clean, done:false });
    saveItems();
    renderChecklist();
  }

  function toggleItem(id){
    const it = items.find(i=>i.id===id);
    if(it){ it.done = !it.done; saveItems(); renderChecklist(); }
  }

  function updateItemText(id, text){
    const it = items.find(i=>i.id===id);
    if(!it) return;
    const clean = text.trim();
    if(!clean){ deleteItem(id); return; }
    it.text = clean;
    saveItems();
  }

  function deleteItem(id){
    items = items.filter(i=>i.id!==id);
    saveItems();
    renderChecklist();
  }

  // ---------------- Tabs ----------------
  function switchTab(tabName){
    els.tabs.forEach(t=> t.classList.toggle('active', t.dataset.tab===tabName));
    els.views.forEach(v=> v.classList.toggle('active', v.id === 'view-'+tabName));
  }

  // ---------------- Event bindings ----------------
  els.tabs.forEach(t=> t.addEventListener('click', ()=> switchTab(t.dataset.tab)));
  els.modePills.forEach(p=> p.addEventListener('click', ()=> switchMode(p.dataset.mode)));
  els.startBtn.addEventListener('click', startPause);
  els.resetBtn.addEventListener('click', reset);
  document.querySelectorAll('[data-adjust]').forEach(btn=>{
    btn.addEventListener('click', ()=> adjustDuration(btn.dataset.adjust, parseInt(btn.dataset.delta,10)));
  });
  els.addForm.addEventListener('submit', e=>{
    e.preventDefault();
    addItem(els.newItemInput.value);
    els.newItemInput.value = '';
    els.newItemInput.focus();
  });

  // ---------------- Init ----------------
  (async function init(){
    await loadSettings();
    await loadItems();
    renderTimer();
    renderChecklist();
  })();
})();
</script>

</body>
</html>
